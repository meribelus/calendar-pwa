<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orientation Safe Calendar</title>

<style>

/* RESPONSIVE FONT */
html{font-size:14px;}
@media(min-width:600px){html{font-size:16px;}}
@media(min-width:1024px){html{font-size:18px;}}

:root{
--bg:#f4f4f4;
--text:#000;
--border:#ccc;
}

body.dark{
--bg:#121212;
--text:#fff;
--border:#333;
}

*{box-sizing:border-box;}

html,body{
margin:0;
height:100%;
}

body{
font-family:system-ui,Arial;
background:var(--bg);
color:var(--text);
}

/* APP */
.app{
height:100dvh;
width:100vw;
padding:1rem;
display:flex;
flex-direction:column;
gap:.75rem;
}

/* TOP BAR */
.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
}

.search{
display:flex;
gap:.4rem;
flex:1;
margin-right:.5rem;
}

.search input{
flex:1;
padding:.5rem;
font-size:1rem;
}

#theme-toggle{
font-size:1rem;
padding:.4rem .6rem;
cursor:pointer;
}

/* HEADER */
.header{
display:grid;
grid-template-columns:auto 1fr auto;
align-items:center;
}

.header h2{
margin:0;
text-align:center;
font-size:1.6rem;
}

button{
font-size:1rem;
padding:.4rem .7rem;
cursor:pointer;
}

/* WEEKDAYS */
.weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
}

.weekdays div{
text-align:center;
padding:.4rem 0;
font-size:.85rem;
border:1px solid var(--border);
}

/* DAYS */
.days-wrapper{
flex:1;
display:flex;
min-height:0;
}

.days{
flex:1;
display:grid;
grid-template-columns:repeat(7,1fr);
grid-auto-rows:1fr;
touch-action:pan-y;
}

.day{
border:1px solid var(--border);
display:flex;
align-items:center;
justify-content:center;
font-size:1rem;
cursor:pointer;
position:relative;
}

.event-title{
position:absolute;
top:3px;
left:3px;
right:3px;
text-align:center;
font-size:.8rem;
font-weight:600;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.today{
outline:.2rem solid orange;
outline-offset:-.2rem;
font-weight:bold;
}

/* COLORS */
.note-red{background:#ffb3b3;}
.note-blue{background:#b3d9ff;}
.note-green{background:#b3ffcc;}
.note-yellow{background:#fff3b3;}

body.dark .note-red{background:#7a2b2b;}
body.dark .note-blue{background:#1e3a5f;}
body.dark .note-green{background:#1f5a3a;}
body.dark .note-yellow{background:#6b5c1f;}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
}

.hidden{display:none;}

.modal-content{
background:var(--bg);
color:var(--text);
width:min(90vw,420px);
padding:1rem;
border-radius:.6rem;
display:flex;
flex-direction:column;
gap:.6rem;
}

textarea,select,input{
font-size:1rem;
padding:.4rem;
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:.5rem;
}

</style>
</head>

<body>

<div class="app">

<div class="top-bar">

<div class="search">
<input id="searchInput" placeholder="Search event, month, or day...">
<button id="searchBtn">🔎</button>
</div>

<button id="theme-toggle">🌙</button>

</div>

<div class="header">
<button id="prev">‹</button>
<h2 id="title"></h2>
<button id="next">›</button>
</div>

<div class="weekdays">
<div>Sun</div><div>Mon</div><div>Tue</div>
<div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
</div>

<div class="days-wrapper">
<div class="days" id="days"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal hidden" id="modal">
<div class="modal-content">

<h3 id="modal-title"></h3>

<input id="title-input" placeholder="Event title">
<textarea id="note" rows="4" placeholder="Write a note..."></textarea>

<select id="color">
<option value="">No label</option>
<option value="red">Urgent</option>
<option value="blue">Work</option>
<option value="green">Personal</option>
<option value="yellow">Reminder</option>
</select>

<div class="modal-actions">
<button id="save">Save</button>
<button id="cancel">Cancel</button>
</div>

</div>
</div>

<script>

const state={
date:new Date(),
notes:JSON.parse(localStorage.getItem("notes"))||{},
selected:null
};

const MONTHS=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

const daysEl=document.getElementById("days");
const titleEl=document.getElementById("title");

const modal=document.getElementById("modal");
const modalTitle=document.getElementById("modal-title");

const noteInput=document.getElementById("note");
const titleInput=document.getElementById("title-input");
const colorInput=document.getElementById("color");

/* THEME */
document.body.classList.toggle("dark",localStorage.getItem("theme")==="dark");

document.getElementById("theme-toggle").onclick=()=>{
document.body.classList.toggle("dark");
localStorage.setItem("theme",
document.body.classList.contains("dark")?"dark":"light");
};

/* RENDER */
function render(){

daysEl.innerHTML="";

const y=state.date.getFullYear();
const m=state.date.getMonth();

titleEl.textContent=`${MONTHS[m]} ${y}`;

const first=new Date(y,m,1).getDay();
const total=new Date(y,m+1,0).getDate();

for(let i=0;i<first;i++){
daysEl.appendChild(document.createElement("div"));
}

for(let d=1;d<=total;d++){

const cell=document.createElement("div");
cell.className="day";

const key=`${y}-${m}-${d}`;
const note=state.notes[key];

if(note?.title){
const t=document.createElement("div");
t.className="event-title";
t.textContent=note.title;
cell.appendChild(t);
}

const num=document.createElement("div");
num.textContent=d;
cell.appendChild(num);

if(note?.color){
cell.classList.add(`note-${note.color}`);
}

const today=new Date();
if(d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear()){
cell.classList.add("today");
}

cell.onclick=()=>openModal(key,d);
daysEl.appendChild(cell);
}

}

/* MODAL */
function openModal(key,day){

state.selected=key;

modalTitle.textContent=`${MONTHS[state.date.getMonth()]} ${day}`;

const note=state.notes[key]||{};

titleInput.value=note.title||"";
noteInput.value=note.text||"";
colorInput.value=note.color||"";

modal.classList.remove("hidden");

}

/* SAVE */
document.getElementById("save").onclick=()=>{
const title=titleInput.value.trim();
const text=noteInput.value.trim();
const color=colorInput.value;

if(!title&&!text){
delete state.notes[state.selected];
}else{
state.notes[state.selected]={title,text,color};
}

localStorage.setItem("notes",JSON.stringify(state.notes));
modal.classList.add("hidden");
render();
};

document.getElementById("cancel").onclick=()=>{
modal.classList.add("hidden");
};

modal.onclick=e=>{
if(e.target===modal)modal.classList.add("hidden");
};

/* NAV */
document.getElementById("prev").onclick=()=>{
state.date.setMonth(state.date.getMonth()-1);
render();
};

document.getElementById("next").onclick=()=>{
state.date.setMonth(state.date.getMonth()+1);
render();
};

/* SEARCH (FIXED) */
function search(){

let q=document.getElementById("searchInput").value
.toLowerCase()
.trim()
.replace(/\s+/g," ");

if(!q) return;

const parts=q.split(" ");

/* month */
let monthIndex=MONTHS.findIndex(m=>m.toLowerCase().startsWith(parts[0]));

/* march 15 */
if(parts.length===2 && monthIndex!==-1){
const day=parseInt(parts[1]);
if(day){
state.date.setMonth(monthIndex);
state.date.setDate(day);
render();
return;
}
}

/* 15 march */
let revMonth=MONTHS.findIndex(m=>m.toLowerCase().startsWith(parts[1]));
if(parts.length===2 && revMonth!==-1){
const day=parseInt(parts[0]);
if(day){
state.date.setMonth(revMonth);
state.date.setDate(day);
render();
return;
}
}

/* month only */
if(monthIndex!==-1){
state.date.setMonth(monthIndex);
render();
return;
}

/* day only */
let day=parseInt(q);
if(!isNaN(day)){
state.date.setDate(day);
render();
return;
}

/* events */
for(const key in state.notes){
const note=state.notes[key];
if(
note.title?.toLowerCase().includes(q)||
note.text?.toLowerCase().includes(q)
){
const [y,m,d]=key.split("-").map(Number);
state.date=new Date(y,m,d);
render();
return;
}
}

alert("No match found");
}

/* EVENTS */
document.getElementById("searchBtn").onclick=search;

document.getElementById("searchInput").addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();
search();
}
});

render();

</script>

</body>
</html>
